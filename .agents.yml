# .agents.yml - Project configuration for Claude Code commands
# Generated by /majestic:init

config_version: 1.9
app_status: development

# Owner Context - Tailors skill outputs to your experience level
owner:
  level: expert

# Tech Stack
tech_stack: rails
ruby_version: "3.4.7"
rails_version: "8.1"
database: sqlite
frontend: hotwire
css: tailwind
assets: propshaft
js: importmap
deployment: kamal
extras:
  - solid_cache
  - solid_queue
  - solid_cable

# Workflow
task_management: linear
workflow_labels:
  - backlog
  - in-progress
  - ready-for-review
  - done
workflow: worktrees
branch_naming: issue-desc   # e.g. BAL-42-add-meal-logging
lessons_path: .agents/lessons/

# Auto-preview markdown files (plans, PRDs, briefs, handoffs)
auto_preview: true

# Blueprint
blueprint:
  auto_create_task: true

# Session - Continuity and crash recovery
# session:
#   ledger: true
#   ledger_path: .agents/session_ledger.md

# Task Tracking - Native Claude Code Task system integration
# task_tracking:
#   enabled: true
#   ledger: true
#   ledger_path: .agents/workflow-ledger.yml
#   auto_cleanup: true

# Browser
browser:
  type: brave

# Toolbox - No design system detected. Run /majestic:ux-brief to generate one.
# toolbox:
#   build_task:
#     design_system_path: docs/design/design-system.md

# Quality Gate - Reviewers run during quality checks
quality_gate:
  reviewers:
    - security-review
    - pragmatic-rails-reviewer
    - performance-reviewer
    - test-reviewer
    # Optional - uncomment to enable:
    # - dhh-code-reviewer       # Strict DHH/37signals Rails style
    # - data-integrity-reviewer # Migration safety (recommended for production)
    # - codex-reviewer          # External LLM (requires Codex CLI)
    # - gemini-reviewer         # External LLM (requires Gemini API)
