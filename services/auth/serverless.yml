service: balansi-auth

frameworkVersion: '4'

provider:
  name: aws
  runtime: provided.al2
  region: us-east-2
  architecture: arm64
  memorySize: 256
  timeout: 10
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    DATABASE_URL: ${env:DATABASE_URL}
    ENCRYPTION_SECRET: ${env:ENCRYPTION_SECRET}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
    COGNITO_CLIENT_SECRET: ${env:COGNITO_CLIENT_SECRET, ''}
    COGNITO_ENDPOINT: ${env:COGNITO_ENDPOINT, ''}
    FRONTEND_DOMAIN: ${env:FRONTEND_DOMAIN, ''}
    API_DOMAIN: ${env:API_DOMAIN, ''}
    COOKIE_DOMAIN: ${env:COOKIE_DOMAIN, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - cognito-idp:SignUp
            - cognito-idp:ListUsers
            - cognito-idp:AdminGetUser
            - cognito-idp:ResendConfirmationCode
            - cognito-idp:ConfirmSignUp
            - cognito-idp:InitiateAuth
            - cognito-idp:ForgotPassword
            - cognito-idp:ConfirmForgotPassword
          Resource:
            - arn:aws:cognito-idp:${self:provider.region}:*:userpool/${env:COGNITO_USER_POOL_ID}
  httpApi:
    cors: false  # Disable API Gateway CORS - handled in Lambda code

functions:
  api:
    handler: bootstrap
    events:
      - httpApi:
          path: /auth/sign-up
          method: post
      - httpApi:
          path: /auth/sign-up
          method: options
      - httpApi:
          path: /auth/confirm
          method: post
      - httpApi:
          path: /auth/confirm
          method: options
      - httpApi:
          path: /auth/refresh
          method: post
      - httpApi:
          path: /auth/refresh
          method: options
      - httpApi:
          path: /auth/me
          method: get
      - httpApi:
          path: /auth/me
          method: options
      - httpApi:
          path: /auth/forgot-password
          method: post
      - httpApi:
          path: /auth/forgot-password
          method: options
      - httpApi:
          path: /auth/reset-password
          method: post
      - httpApi:
          path: /auth/reset-password
          method: options
      - httpApi:
          path: /auth/logout
          method: post
      - httpApi:
          path: /auth/logout
          method: options

package:
  patterns:
    - '!**'
    - 'bootstrap'
