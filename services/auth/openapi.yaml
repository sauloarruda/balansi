openapi: 3.0.3
info:
  title: Balansi Auth API
  version: 1.0.0
  description: |
    Balansi authentication API.

    This API manages user registration and authentication.

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.balansi.me
    description: Production server
  - url: https://api-staging.balansi.me
    description: Staging server

paths:
  /auth/sign-up:
    post:
      summary: Create new user account
      description: |
        Registers a new user in the system.

        After registration, the user will receive a confirmation email and must
        confirm their account before being able to log in.
      operationId: signUp
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
            examples:
              validRequest:
                summary: Valid request
                value:
                  name: "João Silva"
                  email: "joao@example.com"
      responses:
        "200":
          description: |
            User created successfully. The status will always be `pending_confirmation`,
            indicating that the user needs to confirm their email before logging in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
              examples:
                success:
                  summary: Success
                  value:
                    id: 1
                    name: "João Silva"
                    email: "joao@example.com"
                    status: "pending_confirmation"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidRequest:
                  summary: Invalid JSON
                  value:
                    code: "invalid_request"
                    message: "Invalid request body"
                missingFields:
                  summary: Missing required fields
                  value:
                    code: "missing_fields"
                    message: "Name and email are required"
        "409":
          description: |
            Conflict - user already exists with this email.
            The client should redirect to the login page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                userExists:
                  summary: User already exists
                  value:
                    code: "user_exists"
                    message: "User with this email already exists"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                serverError:
                  summary: Server error
                  value:
                    code: "internal_error"
                    message: "Internal server error"

  /auth/confirm:
    post:
      summary: Confirm user account
      description: |
        Confirms a user's account using the code sent via email.
        Sets a session_id cookie (httpOnly) containing encrypted session data.
        The client should then call /auth/refresh to obtain an access token.
      operationId: confirmSignUp
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
      responses:
        "200":
          description: Account confirmed successfully. Sets session_id cookie.
          headers:
            Set-Cookie:
              description: Session ID cookie (httpOnly) containing encrypted session data
              schema:
                type: string
                example: "session_id=encrypted_data; Path=/; HttpOnly; SameSite=Lax; Max-Age=2592000"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "404":
          description: User not found or invalid userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid request or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User is already confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid or expired confirmation code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      summary: Refresh access token
      description: |
        Uses the session_id cookie to obtain a new access token from Cognito.
        The session_id cookie must contain a valid refresh token and the user must be confirmed.
      operationId: refreshToken
      tags:
        - Authentication
      responses:
        "200":
          description: Access token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokenResponse"
        "401":
          description: Invalid or missing session cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidSession:
                  summary: Invalid session
                  value:
                    code: "invalid_session"
                    message: "Invalid session"
                refreshFailed:
                  summary: Refresh failed
                  value:
                    code: "refresh_failed"
                    message: "Failed to refresh token"
        "403":
          description: User not confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                userNotConfirmed:
                  summary: User not confirmed
                  value:
                    code: "user_not_confirmed"
                    message: "User not confirmed"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      summary: Get current user information
      description: |
        Returns information about the currently authenticated user.
        Requires a valid access token in the Authorization header.
      operationId: getMe
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  summary: Missing authorization header
                  value:
                    code: "unauthorized"
                    message: "Missing authorization header"
                invalidToken:
                  summary: Invalid token
                  value:
                    code: "invalid_token"
                    message: "Invalid access token"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    SignupRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          description: User's full name
          example: "João Silva"
        email:
          type: string
          format: email
          description: User's email address (will be used for login)
          example: "joao@example.com"

    SignupResponse:
      type: object
      required:
        - id
        - name
        - email
        - status
      properties:
        id:
          type: integer
          format: int64
          description: Unique user ID in the database
          example: 1
        name:
          type: string
          description: User's name
          example: "João Silva"
        email:
          type: string
          format: email
          description: User's email address
          example: "joao@example.com"
        status:
          type: string
          enum:
            - pending_confirmation
            - confirmed
          description: |
            User registration status.
            - `pending_confirmation`: User created, awaiting email confirmation
            - `confirmed`: User confirmed their email and can log in
          example: "pending_confirmation"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - invalid_request
            - missing_fields
            - user_exists
            - user_not_found
            - user_already_confirmed
            - invalid_code
            - expired_code
            - invalid_session
            - refresh_failed
            - user_not_confirmed
            - unauthorized
            - invalid_token
            - internal_error
          description: |
            Standardized error code to facilitate frontend error handling.
            Codes are mapped to translation keys in the i18n system.
          example: "user_exists"
        message:
          type: string
          description: |
            Error message in English (backend default).
            The frontend should use the `code` to translate the message.
          example: "User with this email already exists"

    ConfirmRequest:
      type: object
      required:
        - userId
        - code
      properties:
        userId:
          type: integer
          format: int64
          description: The user ID returned during sign up
          example: 1
        code:
          type: string
          description: The confirmation code sent to the user's email
          example: "123456"

    TokenResponse:
      type: object
      required:
        - accessToken
        - idToken
        - refreshToken
        - expiresIn
        - tokenType
      properties:
        accessToken:
          type: string
          description: JWT Access Token
        idToken:
          type: string
          description: JWT ID Token
        refreshToken:
          type: string
          description: Refresh Token
        expiresIn:
          type: integer
          description: Token expiration time in seconds
        tokenType:
          type: string
          description: Token type (usually Bearer)
          example: "Bearer"

    AccessTokenResponse:
      type: object
      required:
        - accessToken
        - expiresIn
      properties:
        accessToken:
          type: string
          description: JWT Access Token for API authentication
          example: "eyJraWQiOiJcL3VzZXJwb29sXC8..."
        expiresIn:
          type: integer
          format: int32
          description: Token expiration time in seconds
          example: 3600

    UserInfoResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          description: User ID in the database
          example: 1
        name:
          type: string
          description: User's full name
          example: "João Silva"

  securitySchemes:
    # For future use when implementing authentication
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Authentication
    description: Operations related to user authentication and registration
