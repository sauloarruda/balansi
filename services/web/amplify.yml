version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - |
          if [ -z "$VITE_API_URL" ]; then
            echo "⚠️  WARNING: VITE_API_URL is not set. The app will use localhost:3000 as fallback."
            echo "   Please configure VITE_API_URL in Amplify Console → App settings → Environment variables"
          else
            echo "✅ Using VITE_API_URL=$VITE_API_URL"
          fi
        - npm run build
        - |
          # Copy _redirects to build root for Amplify SPA routing
          if [ -f "static/_redirects" ]; then
            cp static/_redirects build/_redirects
            echo "✅ Copied _redirects to build root"
          else
            echo "⚠️  _redirects file not found in static/"
          fi
  artifacts:
    baseDirectory: build
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .svelte-kit/**/*
