openapi: 3.0.3
info:
  title: Balansi Journal API
  version: 1.0.0
  description: |
    Balansi Journal API for tracking meals, exercises, and health data.

    This API manages meal entries with AI-assisted nutritional estimation.

servers:
  - url: http://localhost:4000/journal
    description: Local development server
  - url: https://api.balansi.me/journal
    description: Production server
  - url: https://api.demo.balansi.me/journal
    description: Staging server

paths:
  /auth/callback:
    get:
      summary: OAuth2 callback endpoint
      description: |
        Handles the OAuth2 callback from Cognito Hosted UI after user authentication.

        Flow:
        1. Receives authorization code from Cognito redirect
        2. Exchanges code for access and refresh tokens
        3. Gets user information from Cognito
        4. Creates or finds user in database
        5. Creates patient record for user
        6. Encrypts session data (refresh token + user ID) and sets in httpOnly cookie
        7. Redirects to frontend URL

        The state parameter (if provided) is passed through to the frontend redirect URL.
      operationId: authCallback
      tags:
        - Authentication
      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code from Cognito OAuth2 callback
          schema:
            type: string
            example: "abc123def456..."
        - name: state
          in: query
          required: false
          description: |
            Optional state parameter passed through from Cognito.
            If provided, it will be appended to the frontend redirect URL.
          schema:
            type: string
            example: "some-state-value"
      responses:
        "302":
          description: Successful authentication - redirects to frontend URL
          headers:
            Location:
              description: Frontend URL with optional state parameter
              schema:
                type: string
                example: "https://app.balansi.me?state=some-state-value"
            Set-Cookie:
              description: |
                Encrypted session cookie containing refresh token and user ID.
                Cookie name: `bal_session_id`
                Cookie attributes: httpOnly, Secure (in production), SameSite=Lax
              schema:
                type: string
                example: "bal_session_id=encrypted-session-data; HttpOnly; Path=/; Max-Age=2592000; SameSite=Lax"
        "400":
          description: Missing required authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingCode:
                  summary: Missing authorization code
                  value:
                    error: "Missing authorization code"
        "500":
          description: Server error during authentication flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                cognitoError:
                  summary: Cognito API error
                  value:
                    error: "Failed to exchange code for tokens"
                configError:
                  summary: Configuration error
                  value:
                    error: "Authentication service not configured"

  /auth/refresh:
    post:
      summary: Refresh access token
      description: |
        Refreshes an expired access token using the refresh token stored in an httpOnly cookie.

        Flow:
        1. Reads encrypted session data from httpOnly cookie (`bal_session_id`)
        2. Extracts refresh token from decrypted session
        3. Calls Cognito to refresh the access token
        4. Returns new access token with expiration time

        The refresh token is stored securely in an encrypted httpOnly cookie,
        preventing JavaScript access while maintaining security.
      operationId: refreshAccessToken
      tags:
        - Authentication
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Access token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
              examples:
                success:
                  summary: Successful token refresh
                  value:
                    access_token: "eyJraWQiOiJcL1wvY29nbml0by11c..."
                    expires_in: 3600
                    token_type: "Bearer"
        "401":
          description: Unauthorized - invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingCookie:
                  summary: Missing session cookie
                  value:
                    error: "Missing session cookie"
                invalidSession:
                  summary: Invalid session data
                  value:
                    error: "Invalid session"
                expiredToken:
                  summary: Expired refresh token
                  value:
                    error: "Invalid or expired refresh token"
        "500":
          description: Server error during token refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                configError:
                  summary: Configuration error
                  value:
                    error: "Authentication service not configured"
                cognitoError:
                  summary: Cognito API error
                  value:
                    error: "Failed to refresh access token"

  /meals:
    post:
      summary: Create a new meal entry
      description: |
        Creates a new meal entry and processes it with LLM for nutritional estimation.

        The meal starts in `pending` status, is processed synchronously (POC),
        and returns with `in_review` status and estimated nutritional values.

        Requires valid JWT access token in Authorization header.
      operationId: createMeal
      tags:
        - Meals
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealRequest"
            examples:
              breakfast:
                summary: Breakfast meal
                value:
                  meal_type: "breakfast"
                  original_description: "2 eggs and toast"
              lunch:
                summary: Lunch meal
                value:
                  meal_type: "lunch"
                  original_description: "Grilled chicken salad with olive oil"
                  date: "2025-01-27"
      responses:
        "201":
          description: Meal created and processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validationError:
                  summary: Validation errors
                  value:
                    errors:
                      meal_type: ["can't be blank"]
                      original_description: ["can't be blank"]
                invalidStatus:
                  summary: Invalid status
                  value:
                    error: "Cannot process meal with status: confirmed. Expected: pending"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List meals for a date
      description: |
        Lists all meals for the authenticated patient on a specific date.

        The date parameter is required and must be in ISO8601 format (YYYY-MM-DD).

        Requires valid JWT access token in Authorization header.
      operationId: listMeals
      tags:
        - Meals
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          description: Date in ISO8601 format (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-01-27"
      responses:
        "200":
          description: List of meals for the specified date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealListResponse"
        "400":
          description: Invalid or missing date parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingDate:
                  summary: Missing date parameter
                  value:
                    error: "Missing required parameter: date"
                invalidDate:
                  summary: Invalid date format
                  value:
                    error: "Invalid date format. Expected ISO8601 format (YYYY-MM-DD)"

  /meals/{id}:
    get:
      summary: Get a specific meal
      description: |
        Retrieves a single meal entry by ID for the authenticated patient.

        Requires valid JWT access token in Authorization header.
      operationId: getMeal
      tags:
        - Meals
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Meal entry ID
          schema:
            type: integer
            example: 123
      responses:
        "200":
          description: Meal found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealResponse"
        "404":
          description: Meal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  summary: Meal not found
                  value:
                    error: "Meal not found"

  /meals/{id}/confirm:
    post:
      summary: Confirm a meal after review
      description: |
        Confirms a meal entry after user review.

        Transitions the meal from `in_review` to `confirmed` status.

        Requires valid JWT access token in Authorization header.
      operationId: confirmMeal
      tags:
        - Meals
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Meal entry ID
          schema:
            type: integer
            example: 123
      responses:
        "200":
          description: Meal confirmed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealResponse"
        "404":
          description: Meal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid status for confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidStatus:
                  summary: Invalid status
                  value:
                    error: "Cannot confirm meal with status: pending. Expected: in_review"

  /health:
    get:
      summary: Health check
      description: |
        Returns the health status of the API.
        Used by Lambda Web Adapter for readiness checks.

        Verifies:
        - Service is running
        - Database (PostgreSQL) connectivity
      operationId: healthCheck
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - database
                  - timestamp
                properties:
                  status:
                    type: string
                    example: "ok"
                    description: Health status of the service
                  service:
                    type: string
                    example: "journal"
                    description: Service identifier
                  database:
                    type: string
                    example: "connected"
                    description: Database connectivity status
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-01-27T10:30:00Z"
                    description: ISO8601 timestamp of the health check
        "503":
          description: Service is unhealthy (database disconnected)
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - database
                  - error
                  - timestamp
                properties:
                  status:
                    type: string
                    example: "unhealthy"
                    description: Health status of the service
                  service:
                    type: string
                    example: "journal"
                    description: Service identifier
                  database:
                    type: string
                    example: "disconnected"
                    description: Database connectivity status
                  error:
                    type: string
                    example: "Database health check failed: connection refused"
                    description: Error message describing the health check failure
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-01-27T10:30:00Z"
                    description: ISO8601 timestamp of the health check

components:
  schemas:
    CreateMealRequest:
      type: object
      required:
        - meal_type
        - original_description
      properties:
        meal_type:
          type: string
          enum: [breakfast, lunch, snack, dinner]
          description: Type of meal
          example: "breakfast"
        original_description:
          type: string
          minLength: 1
          maxLength: 1024
          description: User's description of the meal
          example: "2 eggs and toast"
        date:
          type: string
          format: date
          description: Date of the meal (defaults to today if not provided)
          example: "2025-01-27"

    MealResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Meal"

    MealListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Meal"
        meta:
          type: object
          properties:
            patient_id:
              type: integer
              example: 1
            date:
              type: string
              format: date
              example: "2025-01-27"
            count:
              type: integer
              example: 3

    Meal:
      type: object
      properties:
        id:
          type: integer
          example: 123
        patient_id:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2025-01-27"
        meal_type:
          type: string
          enum: [breakfast, lunch, snack, dinner]
          example: "breakfast"
        original_description:
          type: string
          example: "2 eggs and toast"
        protein_g:
          type: number
          format: float
          nullable: true
          description: Protein in grams (estimated by AI)
          example: 14.5
        carbs_g:
          type: number
          format: float
          nullable: true
          description: Carbohydrates in grams (estimated by AI)
          example: 25.0
        fat_g:
          type: number
          format: float
          nullable: true
          description: Fat in grams (estimated by AI)
          example: 12.3
        calories_kcal:
          type: integer
          nullable: true
          description: Calories in kilocalories (estimated by AI)
          example: 280
        weight_g:
          type: integer
          nullable: true
          description: Total weight in grams (estimated by AI)
          example: 250
        ai_comment:
          type: string
          nullable: true
          description: AI-generated comment about the meal
          example: "This meal provides a good balance of protein and carbohydrates."
        status:
          type: string
          enum: [pending, processing, in_review, confirmed]
          description: Current status of the meal entry
          example: "in_review"
        has_manual_override:
          type: boolean
          description: Whether any nutritional values were manually overridden
          example: false
        created_at:
          type: string
          format: date-time
          example: "2025-01-27T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-01-27T10:31:00Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message (for single errors)
          example: "Meal not found"
        errors:
          type: object
          description: Validation errors (for changeset errors)
          additionalProperties:
            type: array
            items:
              type: string
          example:
            meal_type: ["can't be blank"]
            original_description: ["can't be blank"]

    RefreshTokenResponse:
      type: object
      required:
        - access_token
        - expires_in
        - token_type
      properties:
        access_token:
          type: string
          description: JWT access token for API authentication
          example: "eyJraWQiOiJcL1wvY29nbml0by11c..."
        expires_in:
          type: integer
          description: Token expiration time in seconds
          example: 3600
        token_type:
          type: string
          description: Token type (typically "Bearer")
          example: "Bearer"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token from Cognito in Authorization header.
        Format: `Authorization: Bearer <token>`
        The token contains user claims (cognito_id) and is validated using Cognito JWKS.
        The patient_id is extracted from the user's patient record in the database.

    CookieAuth:
      type: apiKey
      in: cookie
      name: bal_session_id
      description: |
        Encrypted session cookie containing refresh token and user ID.
        Used for token refresh endpoint (`/auth/refresh`).
        Cookie attributes: httpOnly, Secure (in production), SameSite=Lax
        Cookie expires in 30 days (same as Cognito refresh token default).
