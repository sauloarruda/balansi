service: balansi-journal

frameworkVersion: '4'

provider:
  name: aws
  runtime: provided.al2023
  region: us-east-2
  architecture: arm64
  stage: ${opt:stage, 'dev'}
  # Variáveis compartilhadas por todas as funções
  environment:
    STAGE: ${self:provider.stage}
    DATABASE_URL: ${env:DATABASE_URL}
    SECRET_KEY_BASE: ${env:SECRET_KEY_BASE}
    PHX_HOST: ${env:PHX_HOST, 'localhost'}
    PHX_SERVER: true
    PORT: 4000
    # Lambda Web Adapter settings
    AWS_LWA_READINESS_CHECK_PATH: /health
    AWS_LWA_PORT: 4000

functions:
  # Função Lambda separada para endpoints de autenticação
  auth:
    handler: bootstrap
    memorySize: 256  # Auth pode usar menos memória (operações rápidas)
    timeout: 15      # Timeout menor para auth
    layers:
      # Lambda Web Adapter for ARM64
      - arn:aws:lambda:us-east-2:753240598075:layer:LambdaAdapterLayerArm64:22
    environment:
      # Variáveis específicas de auth
      COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID}
      COGNITO_DOMAIN: ${env:COGNITO_DOMAIN}
      COGNITO_REDIRECT_URI: ${env:COGNITO_REDIRECT_URI}
      FRONTEND_DOMAIN: ${env:FRONTEND_DOMAIN, ''}
    events:
      - httpApi:
          path: /journal/auth/{proxy+}
          method: any
      - httpApi:
          path: /journal/auth
          method: any

  # Função Lambda separada para endpoints do journal (meals, health, etc)
  journal:
    handler: bootstrap
    memorySize: 512  # Journal pode precisar de mais memória (LLM processing)
    timeout: 30      # Timeout maior para operações de processamento
    layers:
      # Lambda Web Adapter for ARM64
      - arn:aws:lambda:us-east-2:753240598075:layer:LambdaAdapterLayerArm64:22
    environment:
      # Variáveis específicas do journal
      OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
      FRONTEND_DOMAIN: ${env:FRONTEND_DOMAIN, ''}
    events:
      - httpApi:
          path: /journal/meals/{proxy+}
          method: any
      - httpApi:
          path: /journal/meals
          method: any
      - httpApi:
          path: /journal/health
          method: GET
      - httpApi:
          path: /health
          method: GET

package:
  patterns:
    - '!**'
    - '_build/prod/rel/journal/**'
    - 'bootstrap'
